version: "3.8"

# =============================================================================
# signal-cli - Commandline interface for the Signal messenger
# Official packaging from packaging.gitlab.io
# https://packaging.gitlab.io/signal-cli/installation/docker/
# https://github.com/AsamK/signal-cli
# =============================================================================

services:
  signal-cli:
    image: registry.gitlab.com/packaging/signal-cli/signal-cli-${SIGNAL_CLI_VARIANT:-jre}:${SIGNAL_CLI_TAG:-v0-14-2-1}
    restart: unless-stopped
    # =====================================================================
    # Daemon mode: JSON-RPC interface for sending/receiving Signal messages
    # --http  : HTTP JSON-RPC (recommended for Traefik / REST clients)
    # --tcp   : TCP JSON-RPC (raw socket, change port to 7583)
    # =====================================================================
    command:
      - "daemon"
      - "--${SIGNAL_CLI_MODE:-http}"
      - "0.0.0.0:${SIGNAL_CLI_PORT:-3000}"
    volumes:
      # Persistent storage for Signal device registration, keys and config
      # CRITICAL: Losing this volume requires phone number re-registration
      - signal-cli-data:/var/lib/signal-cli
    # tmpfs with exec required by signal-cli for temporary file operations
    tmpfs:
      - /tmp:exec
    environment:
      # =====================================================================
      # Timezone for message timestamps and cron-like schedules
      # =====================================================================
      TZ: ${TZ:-UTC}
    networks:
      - signal-cli-net
      - dokploy-network
    labels:
      # =====================================================================
      # Traefik Routing — HTTP JSON-RPC mode only
      # =====================================================================
      - "traefik.enable=true"
      - "traefik.http.routers.signal-cli.rule=Host(`${SIGNAL_DOMAIN}`)"
      - "traefik.http.routers.signal-cli.entrypoints=websecure"
      - "traefik.http.routers.signal-cli.tls.certresolver=letsencrypt"
      - "traefik.http.routers.signal-cli.middlewares=signal-cli-security@docker"
      # Security headers middleware
      - "traefik.http.middlewares.signal-cli-security.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.signal-cli-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.signal-cli-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.signal-cli-security.headers.frameDeny=true"
      - "traefik.http.middlewares.signal-cli-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.signal-cli-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      # Service configuration
      - "traefik.http.services.signal-cli.loadbalancer.server.port=${SIGNAL_CLI_PORT:-3000}"
      - "traefik.docker.network=dokploy-network"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:${SIGNAL_CLI_PORT:-3000}/api/v1/rpc || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  signal-cli-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  signal-cli-net:
    driver: bridge
  dokploy-network:
    external: true
