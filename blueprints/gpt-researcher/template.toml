# gpt-researcher - Open deep research agent with LLM-powered web and local document research
# https://github.com/assafelovic/gpt-researcher

[variables]
domain = "${domain}"
api_domain = "api.${domain}"

# Required: LLM provider API key (OpenAI or compatible)
openai_api_key = ""

# Required: Tavily web search API key
# Get free key at: https://tavily.com (1,000 credits/month free)
tavily_api_key = ""

# Optional: Custom OpenAI-compatible base URL (for local LLMs, Azure, etc.)
openai_base_url = ""

# Optional: LangChain tracing
langchain_api_key = ""

# Optional: Google API key for Gemini image generation
google_api_key = ""

# Optional: Logging level (DEBUG, INFO, WARNING, ERROR)
logging_level = "INFO"

# Optional: Google Analytics
ga_measurement_id = ""

[[config.domains]]
serviceName = "gptr-nextjs"
port = 3000
host = "${domain}"

[[config.domains]]
serviceName = "gpt-researcher"
port = 8000
host = "${api_domain}"

[config.env]
# ===========================================
# Domain Configuration
# ===========================================
DOMAIN = "${domain}"

# ===========================================
# LLM Provider
# ===========================================
OPENAI_API_KEY = "${openai_api_key}"
OPENAI_BASE_URL = "${openai_base_url}"

# ===========================================
# Web Search (Tavily)
# ===========================================
TAVILY_API_KEY = "${tavily_api_key}"

# ===========================================
# Frontend API URL (auto-derived from domain)
# ===========================================
NEXT_PUBLIC_GPTR_API_URL = "https://${api_domain}"

# ===========================================
# Optional: LangChain Tracing
# ===========================================
LANGCHAIN_API_KEY = "${langchain_api_key}"
LANGCHAIN_TRACING_V2 = "false"
LANGCHAIN_PROJECT = "gpt-researcher"

# ===========================================
# Optional: Image Generation
# ===========================================
GOOGLE_API_KEY = "${google_api_key}"
IMAGE_GENERATION_ENABLED = "false"
IMAGE_GENERATION_MODEL = "dall-e-3"
IMAGE_GENERATION_MAX_IMAGES = "5"

# ===========================================
# Logging & Analytics
# ===========================================
LOGGING_LEVEL = "${logging_level}"
GA_MEASUREMENT_ID = "${ga_measurement_id}"
