# =============================================================================
# Pangolin - Identity-Aware VPN and Proxy Server
# https://github.com/fosrl/pangolin
# =============================================================================
# Architecture:
# - Pangolin: Central control plane / admin dashboard (port 3001 API, 3000 UI)
# - Gerbil: WireGuard-based tunnel agent (UDP 51820, HTTPS 443)
# - Traefik: Dynamic reverse proxy running in Gerbil's network namespace
#
# NOTE: This stack includes its own Traefik instance for proxying tunneled
# services. Pangolin's admin dashboard is exposed via Dokploy's host Traefik.
# Ports 443 and 80 (used by Gerbil/Traefik) may conflict with Dokploy's
# Traefik on the same host — deploy on a dedicated server for best results.
# =============================================================================

version: "3.8"

services:
  # ===========================================================================
  # Pangolin - Identity-Aware Proxy Control Plane
  # Admin dashboard on port 3000, REST API on port 3001
  # ===========================================================================
  pangolin:
    # NOTE: The tag "sha256-..." is a valid GHCR image tag (not a digest reference).
    # GitHub Actions publishes images with this tag format alongside semantic version tags.
    image: ghcr.io/fosrl/pangolin:sha256-3013a0e89e3259567fd86d23af50fc1c7ad9216ab0693ceb823b01c35e6acb5
    restart: unless-stopped
    volumes:
      # Shared config directory — WireGuard key (written by gerbil) is read here
      # Pangolin's config.yml is injected via Dokploy config mounts
      - pangolin-config:/app/config
    networks:
      - pangolin-internal
      - dokploy-network
    labels:
      # ===========================================================================
      # Traefik Routing - Pangolin Admin Dashboard
      # Exposed via Dokploy's host Traefik on the configured domain
      # ===========================================================================
      - "traefik.enable=true"
      - "traefik.http.routers.pangolin.rule=Host(`${PANGOLIN_DOMAIN}`)"
      - "traefik.http.routers.pangolin.entrypoints=websecure"
      - "traefik.http.routers.pangolin.tls.certresolver=letsencrypt"
      - "traefik.http.services.pangolin.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/v1/"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ===========================================================================
  # Gerbil - WireGuard Tunnel Agent
  # Manages WireGuard VPN peers and exposes HTTP/HTTPS for Traefik
  # Requires NET_ADMIN and SYS_MODULE capabilities for WireGuard kernel module
  # ===========================================================================
  gerbil:
    image: ghcr.io/fosrl/gerbil:1.3.0
    restart: unless-stopped
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --reachableAt=http://gerbil:3004
      - --generateAndSaveKeyTo=/var/config/key
      - --remoteConfig=http://pangolin:3001/api/v1/
    volumes:
      # Gerbil shares the same config volume to write the WireGuard key
      # Key is written to /var/config/key → readable by pangolin at /app/config/key
      - pangolin-config:/var/config
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ports:
      # ===========================================================================
      # EXCEPTION TO BLUEPRINT "NO EXPOSED PORTS" RULE:
      # Pangolin is a self-contained networking stack that includes its own Traefik
      # instance. It requires host-level port binding for:
      #   - WireGuard VPN (UDP 51820): must be reachable by remote tunnel clients
      #   - HTTPS (443): terminates TLS for all services proxied through Pangolin
      #   - HTTP (80): Let's Encrypt ACME httpChallenge; redirects to HTTPS
      # These ports CANNOT be routed through Dokploy's Traefik because Gerbil and
      # its Traefik must bind them directly on the host network stack.
      # ===========================================================================
      # WireGuard VPN endpoint (UDP) — must be reachable by tunnel clients
      - "${WIREGUARD_PORT:-51820}:51820/udp"
      # HTTPS for Pangolin's embedded Traefik — terminates TLS for tunneled services
      # WARNING: Conflicts with Dokploy's Traefik if deployed on the same host.
      # Deploy on a dedicated server or change HTTPS_PROXY_PORT and HTTP_PROXY_PORT.
      # NOTE: Changing HTTP_PROXY_PORT away from 80 will break Let's Encrypt
      # ACME httpChallenge. Port 80 must remain accessible for certificate issuance.
      - "${HTTPS_PROXY_PORT:-443}:443"
      - "${HTTP_PROXY_PORT:-80}:80"
    networks:
      - pangolin-internal
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 3004 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # Traefik - Dynamic Reverse Proxy for Pangolin-Tunneled Services
  # Runs in Gerbil's network namespace to handle HTTP/HTTPS routing
  # This is Pangolin's own Traefik — separate from Dokploy's Traefik
  # ===========================================================================
  traefik:
    image: traefik:v3.3.0
    restart: unless-stopped
    # Shares Gerbil's network namespace so it can use Gerbil's exposed ports
    network_mode: "service:gerbil"
    depends_on:
      pangolin:
        condition: service_healthy
    command:
      - --configFile=/etc/traefik/traefik_config.yml
    volumes:
      - traefik-certs:/letsencrypt

# =============================================================================
# Volumes
# =============================================================================
volumes:
  # Shared config: both pangolin (/app/config) and gerbil (/var/config) mount
  # this same volume so the WireGuard key generated by gerbil is readable by pangolin
  pangolin-config:
    driver: local
  traefik-certs:
    driver: local

# =============================================================================
# Networks
# =============================================================================
# EXCEPTION TO BLUEPRINT "DON'T DEFINE NETWORKS" RULE:
# This multi-service stack requires explicit network definitions because:
#   - pangolin-internal: isolates Pangolin/Gerbil/Traefik inter-service traffic
#     from the public-facing Dokploy network (security isolation)
#   - dokploy-network: required to attach the pangolin service to Dokploy's
#     host Traefik so the admin dashboard can be routed and TLS-terminated
# Without these, service discovery between Pangolin and Gerbil breaks and the
# admin dashboard cannot be reached via Dokploy's Traefik.
# =============================================================================
networks:
  pangolin-internal:
    driver: bridge
  dokploy-network:
    external: true
