# Pangolin - Identity-Aware VPN and Proxy Server
# Secure remote access with zero-trust identity enforcement
# https://github.com/fosrl/pangolin

[variables]
# =============================================================================
# Domain Configuration
# =============================================================================
# Admin dashboard domain (e.g., pangolin.example.com) — REQUIRED
pangolin_domain = "${domain}"

# Base domain for WireGuard tunnel clients and service routing (e.g., example.com) — REQUIRED
# This domain is used both as the WireGuard endpoint base and to build URLs for
# services accessed through WireGuard tunnels.
# Example: "example.com"
base_domain = ""

# =============================================================================
# Admin Account — REQUIRED
# =============================================================================
# Initial admin email address (e.g., admin@example.com)
admin_email = ""
admin_password = "${password:32}"

# =============================================================================
# Security Secrets (auto-generated)
# =============================================================================
app_secret = "${password:32}"
resource_access_secret = "${password:32}"

# =============================================================================
# Port Configuration
# =============================================================================
# WireGuard VPN UDP port — exposed directly on the host
wireguard_port = "51820"

# =============================================================================
# Optional: SMTP Email Configuration
# Required for user invite emails, password resets, etc.
# =============================================================================
smtp_host = ""
smtp_port = "587"
smtp_username = ""
smtp_password = ""
smtp_from_email = ""

# =============================================================================
# Application Settings
# =============================================================================
log_level = "info"

# =============================================================================
# Domain Routing (Dokploy's Traefik)
# Points to Pangolin admin dashboard
# =============================================================================
[[config.domains]]
serviceName = "pangolin"
port = 3000
host = "${pangolin_domain}"

# =============================================================================
# Environment Variables
# =============================================================================
[config.env]
PANGOLIN_DOMAIN = "${pangolin_domain}"
WIREGUARD_PORT = "${wireguard_port}"

# =============================================================================
# Pangolin Configuration File
# Mounted into the container at /app/config/config.yml
# =============================================================================
[[config.mounts]]
serviceName = "pangolin"
mountPath = "/app/config/config.yml"
content = """
# Pangolin Configuration
# Auto-generated by Dokploy — edit via environment variables or redeploy
# https://docs.pangolin.net/self-host/manual/install

# =============================================================================
# Application
# =============================================================================
app:
  dashboard_url: "https://${pangolin_domain}"
  log_level: "${log_level}"
  save_logs: false
  secret: "${app_secret}"

# =============================================================================
# Domain
# =============================================================================
domains:
  base_domain: "${base_domain}"

# =============================================================================
# Admin User (initial setup — change password after first login)
# =============================================================================
users:
  server_admin:
    email: "${admin_email}"
    password: "${admin_password}"

# =============================================================================
# Ingress
# =============================================================================
ingress:
  base_domain: "${base_domain}"

# =============================================================================
# Gerbil (WireGuard tunnel agent)
# =============================================================================
gerbil:
  start_port: ${wireguard_port}
  base_endpoint: "${base_domain}:${wireguard_port}"
  block_size: 24
  site_block_size: 30
  subnet_group: "100.89.137.0/20"

# =============================================================================
# HTTP Server
# =============================================================================
server:
  # Port 443 is the standard HTTPS port used in Pangolin-generated resource URLs.
  # The admin UI is routed through Dokploy's Traefik (no separate proxy in this stack).
  external_port: 443
  session_cookie_name: "p_session_token"
  resource_access_token_param: "p_token"
  resource_access_token_headers: "X-Pangolin-Token"
  resource_access_secret: "${resource_access_secret}"
  cors:
    origins:
      - "https://${pangolin_domain}"

# =============================================================================
# Rate Limiting
# =============================================================================
rate_limit:
  window_minutes: 1
  max_requests: 100

# =============================================================================
# Email / SMTP (optional — required for user invites and password resets)
# =============================================================================
email:
  smtp_host: "${smtp_host}"
  smtp_port: ${smtp_port}
  smtp_username: "${smtp_username}"
  smtp_password: "${smtp_password}"
  no_reply_address: "${smtp_from_email}"
  email_header: "Pangolin"
"""
