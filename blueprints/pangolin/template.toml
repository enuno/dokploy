# Pangolin - Identity-Aware VPN and Proxy Server
# Secure remote access with zero-trust identity enforcement
# https://github.com/fosrl/pangolin

[variables]
# =============================================================================
# Domain Configuration
# =============================================================================
# Admin dashboard domain (e.g., pangolin.example.com) — REQUIRED
pangolin_domain = "${domain}"

# Base domain for tunneled services (e.g., example.com) — REQUIRED
# Wildcard DNS *.example.com should point to this server
# Example: "example.com"
base_domain = ""

# =============================================================================
# Admin Account — REQUIRED
# =============================================================================
# Initial admin email address (e.g., admin@example.com)
admin_email = ""
admin_password = "${password:32}"

# =============================================================================
# Let's Encrypt — REQUIRED
# Email used for certificate notifications and recovery
# =============================================================================
letsencrypt_email = ""

# =============================================================================
# Security Secrets (auto-generated)
# =============================================================================
app_secret = "${password:32}"
resource_access_secret = "${password:32}"

# =============================================================================
# Port Configuration
# These can be changed to avoid conflicts with Dokploy's Traefik
# =============================================================================
wireguard_port = "51820"
https_proxy_port = "443"
http_proxy_port = "80"

# =============================================================================
# Optional: SMTP Email Configuration
# Required for user invite emails, password resets, etc.
# =============================================================================
smtp_host = ""
smtp_port = "587"
smtp_username = ""
smtp_password = ""
smtp_from_email = ""

# =============================================================================
# Application Settings
# =============================================================================
log_level = "info"

# =============================================================================
# Domain Routing (Dokploy's Traefik)
# Points to Pangolin admin dashboard
# =============================================================================
[[config.domains]]
serviceName = "pangolin"
port = 3000
host = "${pangolin_domain}"

# =============================================================================
# Environment Variables
# =============================================================================
[config.env]
PANGOLIN_DOMAIN = "${pangolin_domain}"
WIREGUARD_PORT = "${wireguard_port}"
HTTPS_PROXY_PORT = "${https_proxy_port}"
HTTP_PROXY_PORT = "${http_proxy_port}"

# =============================================================================
# Pangolin Configuration File
# Mounted into the container at /app/config/config.yml
# =============================================================================
[[config.mounts]]
serviceName = "pangolin"
mountPath = "/app/config/config.yml"
content = """
# Pangolin Configuration
# Auto-generated by Dokploy — edit via environment variables or redeploy
# https://docs.pangolin.net/self-host/manual/install

# =============================================================================
# Application
# =============================================================================
app:
  dashboard_url: "https://${pangolin_domain}"
  log_level: "${log_level}"
  save_logs: false
  secret: "${app_secret}"

# =============================================================================
# Domain
# =============================================================================
domains:
  base_domain: "${base_domain}"
  cert_resolver: "letsencrypt"
  prefer_wildcard_cert: false

# =============================================================================
# Admin User (initial setup — change password after first login)
# =============================================================================
users:
  server_admin:
    email: "${admin_email}"
    password: "${admin_password}"

# =============================================================================
# Ingress
# =============================================================================
ingress:
  base_domain: "${base_domain}"

# =============================================================================
# Gerbil (WireGuard tunnel agent)
# =============================================================================
gerbil:
  start_port: 51820
  base_endpoint: "${base_domain}:51820"
  block_size: 24
  site_block_size: 30
  subnet_group: "100.89.137.0/20"

# =============================================================================
# Traefik (Pangolin's embedded reverse proxy)
# =============================================================================
traefik:
  cert_resolver: "letsencrypt"
  http_entrypoint: "web"
  https_entrypoint: "websecure"

# =============================================================================
# HTTP Server
# =============================================================================
server:
  external_port: ${https_proxy_port}
  session_cookie_name: "p_session_token"
  resource_access_token_param: "p_token"
  resource_access_token_headers: "X-Pangolin-Token"
  resource_access_secret: "${resource_access_secret}"
  cors:
    origins:
      - "https://${pangolin_domain}"

# =============================================================================
# Rate Limiting
# =============================================================================
rate_limit:
  window_minutes: 1
  max_requests: 100

# =============================================================================
# Email / SMTP (optional — required for user invites and password resets)
# =============================================================================
email:
  smtp_host: "${smtp_host}"
  smtp_port: ${smtp_port}
  smtp_username: "${smtp_username}"
  smtp_password: "${smtp_password}"
  no_reply_address: "${smtp_from_email}"
  email_header: "Pangolin"
"""

# =============================================================================
# Traefik Static Configuration
# Mounted into the Traefik container at /etc/traefik/traefik_config.yml
# =============================================================================
[[config.mounts]]
serviceName = "traefik"
mountPath = "/etc/traefik/traefik_config.yml"
content = """
# Traefik Static Configuration for Pangolin
# https://doc.traefik.io/traefik/getting-started/configuration-overview/

api:
  dashboard: false
  insecure: false

log:
  level: "INFO"

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true
  websecure:
    address: ":443"

certificatesResolvers:
  letsencrypt:
    acme:
      email: "${letsencrypt_email}"
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web

providers:
  http:
    endpoint: "http://pangolin:3001/api/v1/traefik-config"
    pollInterval: "5s"
  file:
    filename: /etc/traefik/dynamic_config.yml
    watch: true
"""

# =============================================================================
# Traefik Dynamic Configuration
# =============================================================================
[[config.mounts]]
serviceName = "traefik"
mountPath = "/etc/traefik/dynamic_config.yml"
content = """
# Traefik Dynamic Configuration for Pangolin
# This file is managed by Pangolin — changes may be overwritten

http:
  middlewares:
    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
"""
