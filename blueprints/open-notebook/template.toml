# Open Notebook - AI-powered notebook for researchers
# https://github.com/lfnovo/open-notebook

[variables]
domain = "${domain}"
encryption_key = "${base64:32}"

[[config.domains]]
serviceName = "open-notebook"
port = 8502
host = "${domain}"

[config.env]
# ===========================================
# Domain Configuration (REQUIRED)
# ===========================================
OPEN_NOTEBOOK_DOMAIN = "${domain}"

# ===========================================
# Security (REQUIRED)
# ===========================================
# Secret key for encrypting API credentials stored in SurrealDB
OPEN_NOTEBOOK_ENCRYPTION_KEY = "${encryption_key}"

# ===========================================
# SurrealDB Configuration
# ===========================================
SURREAL_USER = "root"
SURREAL_PASSWORD = "root"
SURREAL_NAMESPACE = "open_notebook"
SURREAL_DATABASE = "open_notebook"

# ===========================================
# Content Processing
# ===========================================
CHUNK_SIZE = "1500"
CHUNK_OVERLAP = "150"
