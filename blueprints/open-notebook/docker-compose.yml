version: "3.8"

services:
  # =============================================================================
  # Open Notebook - AI-powered notebook for researchers
  # https://github.com/lfnovo/open-notebook
  # =============================================================================
  open-notebook:
    image: lfnovo/open_notebook:1.8.5
    restart: always
    depends_on:
      surrealdb:
        condition: service_started
    volumes:
      - open-notebook-data:/app/data
    environment:
      # ========================================================================
      # Security (REQUIRED)
      # ========================================================================
      OPEN_NOTEBOOK_ENCRYPTION_KEY: ${OPEN_NOTEBOOK_ENCRYPTION_KEY:?Set an encryption key}

      # ========================================================================
      # Domain & API Configuration
      # ========================================================================
      API_URL: https://${OPEN_NOTEBOOK_DOMAIN:?Set your domain}
      INTERNAL_API_URL: http://localhost:5055
      CORS_ORIGINS: https://${OPEN_NOTEBOOK_DOMAIN}

      # ========================================================================
      # SurrealDB Connection
      # ========================================================================
      SURREAL_URL: ws://surrealdb:8000/rpc
      SURREAL_USER: ${SURREAL_USER:-root}
      SURREAL_PASSWORD: ${SURREAL_PASSWORD:-root}
      SURREAL_NAMESPACE: ${SURREAL_NAMESPACE:-open_notebook}
      SURREAL_DATABASE: ${SURREAL_DATABASE:-open_notebook}

      # ========================================================================
      # Optional: Content Processing
      # ========================================================================
      CHUNK_SIZE: ${CHUNK_SIZE:-1500}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-150}

    networks:
      - open-notebook-net
      - dokploy-network
    labels:
      # ========================================================================
      # Traefik Routing Configuration
      # ========================================================================
      - "traefik.enable=true"
      - "traefik.http.routers.open-notebook.rule=Host(`${OPEN_NOTEBOOK_DOMAIN}`)"
      - "traefik.http.routers.open-notebook.entrypoints=websecure"
      - "traefik.http.routers.open-notebook.tls.certresolver=letsencrypt"

      # Security headers middleware
      - "traefik.http.routers.open-notebook.middlewares=open-notebook-security-headers@docker"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.browserXssFilter=true"
      - "traefik.http.middlewares.open-notebook-security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"

      # Service configuration
      - "traefik.http.services.open-notebook.loadbalancer.server.port=8502"
      - "traefik.docker.network=dokploy-network"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # =============================================================================
  # SurrealDB - Distributed NoSQL database
  # https://surrealdb.com
  # =============================================================================
  surrealdb:
    image: surrealdb/surrealdb:v2.6.5
    restart: always
    # NOTE: Credentials are hardcoded here because SurrealDB CLI args do not
    # support env interpolation in array form. The DB is isolated to the
    # internal network and not exposed externally.
    command:
      - start
      - --log
      - info
      - --user
      - root
      - --pass
      - root
      - rocksdb:/mydata/mydatabase.db
    volumes:
      - surrealdb-data:/mydata
    environment:
      SURREAL_EXPERIMENTAL_GRAPHQL: "true"
    networks:
      - open-notebook-net
    healthcheck:
      test: ["CMD", "surreal", "version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  open-notebook-data:
    driver: local
  surrealdb-data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  open-notebook-net:
    driver: bridge
  dokploy-network:
    external: true
